<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="px-4 md:px-10 bg-[var(--color-background)]">

    <!-- HEADER -->
    <header class="flex items-center justify-between w-full p-4 border-b border-amber-700/50">

      <img src="/client/src/img/logowedding.png" class="w-28 md:w-32" />

      <!-- NAV -->
      <nav class="hidden xl:flex gap-10 text-lg">
        <a href="dashboard.html" class="px-4 py-1 rounded-4xl hover:bg-[var(--color-quaternary-100)] bg-[var(--color-quaternary-200)] transition">
          Dashboard
        </a>
        <a href="convidados.html" class="px-4 py-1 rounded-4xl hover:bg-[var(--color-quaternary-100)] active:bg-[var(--color-quaternary-200)] transition">
          Convidados
        </a>
        <a href="checkin.html" class="px-4 py-1 rounded-4xl hover:bg-[var(--color-quaternary-100)] active:bg-[var(--color-quaternary-200)] transition">
          Check-in
        </a>
      </nav>

      <!-- MENU MOBILE -->
      <img
        src="/client/src/files/burgermenu.svg"
        class="w-8 xl:hidden"
        id="burgermenu"
      />
    </header>

    <div class="flex flex-col xl:flex-row justify-around">
      <!-- CARD TOTAL DE CONVIDADOS -->
      <div class="flex flex-row justify-between mt-5 hover:scale-103 transition duration-200">
        <div class="flex flex-col justify-between rounded-3xl w-full h-auto xl:w-100 xl:h-50 bg-white p-6 shadow">

          <h2 class="text-lg text-gray-600 font-medium">
            Total de Convidados
          </h2>

          <div class="flex items-center justify-between">
            <img 
              src="/client/src/files/pessoas.png" 
              alt="Logo pessoas" 
              class="w-10 xl:mt-3"
            >

            <p id="registrados" class="text-3xl font-semibold">
              0
            </p>
          </div>

        </div>
      </div>

      <!-- CARD TOTAL CONFIRMADOS  -->

      <div class="flex flex-row justify-between mt-5 hover:scale-103 transition duration-200">
        <div class="flex flex-col justify-between rounded-3xl w-full h-auto xl:w-100 xl:h-50 bg-white p-6 shadow">

          <h2 class="text-lg text-emerald-600 font-medium">
            Total de Confirmados
          </h2>

          <div class="flex items-center justify-between">
            <img 
              src="/client/src/files/marca-certo.png" 
              alt="Logo pessoas" 
              class="w-10 xl:mt-3"
            >

            <p id="confirmados" class="text-3xl text-emerald-600 font-semibold">
              0
            </p>
          </div>

        </div>
      </div>

      <!-- TOTAL DE PENDENTES  -->

      <div class="flex flex-row justify-between mt-5 hover:scale-103 transition duration-200">
        <div class="flex flex-col justify-between rounded-3xl w-full h-auto xl:w-100 xl:h-50 bg-white p-6 shadow">

          <h2 class="text-md xl:text-lg text-yellow-500 font-medium">
            Total de Pendentes
          </h2>

          <div class="flex items-center text-yellow-500 justify-between">
            <img 
              src="/client/src/files/marca-errado.png" 
              alt="Logo pessoas" 
              class="w-10 xl:mt-3"
            >

            <p id="pendentes" class="text-3xl text-yellow-500 font-semibold">
              0
            </p>
          </div>

        </div>
      </div>
    </div>
    <!-- ULTIMOS CONFIRMADOS  -->
     
  </body>
</html>
