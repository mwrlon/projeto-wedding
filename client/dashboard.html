<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="/client/src/files/favicon.ico"
      type="image/x-icon"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="px-4 md:px-10 bg-[var(--color-background)]">
    <!-- HEADER -->
    <header
      class="flex items-center justify-between w-full p-4 border-b border-amber-700/50"
    >
      <img src="/client/src/img/logowedding.png" class="w-28 md:w-32" />

      <!-- NAV -->
      <nav class="hidden xl:flex gap-10 text-lg">
        <a
          href="dashboard.html"
          class="px-4 py-1 rounded-4xl hover:bg-[var(--color-quaternary-100)] text-white bg-[var(--color-quaternary-200)] active:bg-[var(--color-quaternary-200)] transition"
        >
          Dashboard
        </a>
        <a
          href="convidados.html"
          class="px-4 py-1 rounded-4xl hover:bg-[var(--color-quaternary-100)] hover:text-white active:bg-[var(--color-quaternary-200)] transition"
        >
          Convidados
        </a>
        <a
          href="checkin.html"
          class="px-4 py-1 rounded-4xl hover:bg-[var(--color-quaternary-100)] hover:text-white active:bg-[var(--color-quaternary-200)] transition"
        >
          Check-in
        </a>
      </nav>

      <!-- MENU MOBILE -->
       <button id="burgermenu">
      <img
        src="/client/src/files/burgermenu.svg"
        class="w-8 xl:hidden cursor-pointer"
      />
      </button>

        <!-- MENU DROPDOWN -->
  <div
    id="navlinks"
    class="opacity-0 transition xl:hidden flex flex-col place-items-center absolute right-10 top-18 mt-2 w-54 bg-white rounded-2xl shadow-lg flex-col p-4"
  >
    <a href="dashboard.html" class="py-1 px-3 my-2 text-white bg-[var(--color-quaternary-100)] active:bg-[var(--color-quaternary-200)] rounded-2xl text-lg">Dashboard</a>
    <a href="convidados.html" class="py-1 px-3 my-2  border-b border-amber-700/50 text-lg">Convidados</a>
    <a href="checkin.html" class="py-1 px-3 my-2  border-b border-amber-700/50 text-lg">Check-in</a>
  </div>
</header>

    <!-- CONTEÚDO -->
    <main class="mt-8 mb-2 flex flex-col gap-6">
      <div>
        <h1 class="text-4xl md:text-5xl">Dashboard</h1>
        <p class="text-gray-600 md:text-md md:ml-1">Visão geral do evento</p>
      </div>
    </main>

    <div class="flex flex-col xl:flex-row justify-evenly">
      <!-- CARD TOTAL DE CONVIDADOS -->
      <div
        class="flex flex-row justify-between mt-5 hover:scale-103 transition duration-200"
      >
        <div
          class="flex flex-col justify-between rounded-3xl w-full h-auto xl:w-100 xl:h-50 bg-white p-6 shadow"
        >
          <h2 class="text-lg text-gray-600 font-medium">Total de Convidados</h2>

          <div class="flex items-center justify-between">
            <img
              src="/client/src/files/pessoas.png"
              alt="Logo pessoas"
              class="w-10 xl:mt-3"
            />

            <p id="registrados" class="text-3xl font-semibold text-gray-600">
              0
            </p>
          </div>
        </div>
      </div>

      <!-- CARD TOTAL CONFIRMADOS  -->

      <div
        class="flex flex-row justify-between mt-5 hover:scale-103 transition duration-200"
      >
        <div
          class="flex flex-col justify-between rounded-3xl w-full h-auto xl:w-100 xl:h-50 bg-white p-6 shadow"
        >
          <h2 class="text-lg text-emerald-600 font-medium">
            Total de Confirmados
          </h2>

          <div class="flex items-center justify-between">
            <img
              src="/client/src/files/marca-certo.png"
              alt="Logo pessoas"
              class="w-10 xl:mt-3"
            />

            <p id="confirmados" class="text-3xl text-emerald-600 font-semibold">
              0
            </p>
          </div>
        </div>
      </div>

      <!-- TOTAL DE PENDENTES  -->

      <div
        class="flex flex-row justify-between mt-5 hover:scale-103 transition duration-200"
      >
        <div
          class="flex flex-col justify-between rounded-3xl w-full h-auto xl:w-100 xl:h-50 bg-white p-6 shadow"
        >
          <h2 class="text-md xl:text-lg text-yellow-500 font-medium">
            Total de Pendentes
          </h2>

          <div class="flex items-center text-yellow-500 justify-between">
            <img
              src="/client/src/files/marca-errado.png"
              alt="Logo pessoas"
              class="w-10 xl:mt-3"
            />

            <p id="pendentes" class="text-3xl text-yellow-500 font-semibold">
              0
            </p>
          </div>
        </div>
      </div>
    </div>
    <!-- ULTIMOS CONFIRMADOS  -->
  <template id="cardconfirmados">
    <div class="w-full bg-[#fffbf7] rounded-2xl p-6 shadow-sm mt-20">
      <h2 class="text-lg text-gray-600 font-medium mb-4">Últimos Check-ins</h2>

      <div
        class="flex items-center justify-between py-3 border-b border-black/30"
      >
        <div>
          <p class="text-base font-medium text-gray-800" id="nomepessoa">
            Nome pessoa
          </p>
          <p class="text-sm text-gray-500">Check-in realizado</p>
        </div>

        <div class="text-right">
          <p class="text-sm text-gray-500">Mesa</p>
          <p class="text-base font-semibold text-gray-800">
            <span id="mesa">0</span>
          </p>
        </div>
      </div>
    </div>
  </template>

  <script src="scriptdashboard.js"></script>
  </body>
</html>
